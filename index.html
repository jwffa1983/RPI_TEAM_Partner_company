<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RPI 협력사 방문 관리</title>

  <style>
    body{
      font-family:system-ui,-apple-system,"Noto Sans KR","Malgun Gothic";
      background:#0b1220; color:#e9eefc; margin:0;
    }
    h1{margin:0;font-size:20px}
    .wrap{max-width:1100px;margin:auto;padding:16px}
    .card{
      background:#101a33;border-radius:14px;
      padding:14px;margin-bottom:16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    label{display:block;margin-top:10px;font-size:12px;color:#9fb0d0}
    input,select,textarea{
      width:100%;border-radius:12px;
      background:#00000030;color:#e9eefc;
      border:1px solid rgba(255,255,255,.12);
      padding:10px;font-size:14px;
      box-sizing:border-box;
      outline:none;
    }
    input::placeholder{color:#7f93b8}
    .input-tall{height:96px;padding-top:14px;padding-bottom:14px}
    .select-tall{height:96px}
    button{
      background:#4da3ff;color:#081122;
      border:0;border-radius:12px;
      padding:10px 14px;font-weight:700;
      cursor:pointer;
    }
    button:hover{filter:brightness(1.05)}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{border-bottom:1px solid rgba(255,255,255,.12);padding:8px;font-size:12px;vertical-align:top}
    th{text-align:left;color:#cfe6ff}
    .tag{background:#4da3ff33;padding:2px 8px;border-radius:999px}
    .hint{font-size:12px;color:#9fb0d0;margin:6px 0 0}
    .warn{
      background:#ffcc0022;
      border:1px solid rgba(255,204,0,.35);
      color:#ffeaa0;
      padding:10px 12px;
      border-radius:12px;
      margin:12px 0;
      font-size:12px;
      line-height:1.4;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <h1>RPI 협력사 방문 관리</h1>
    <p class="hint">※ 데이터는 브라우저 LocalStorage(<b>visits_data</b>)에 저장됩니다</p>

    <div id="storageWarn" class="warn" style="display:none;">
      현재 브라우저 환경에서 LocalStorage 접근이 차단되어 저장/조회가 안 될 수 있습니다.
      (사내 보안 설정/프라이빗 모드/추적방지 옵션 등) <br/>
      해결: 일반 모드 크롬/엣지에서 열거나, 사이트 저장소 차단을 해제하세요.
    </div>

    <div class="card">
      <h2 style="font-size:14px;margin:0 0 6px;">방문 기록 추가</h2>

      <label for="vendorName">협력사명</label>
      <input id="vendorName" class="input-tall" placeholder="예) 경동나비엔" />

      <label for="visitDate">방문일</label>
      <input id="visitDate" type="date" />

      <label for="managerName">담당자</label>
      <input id="managerName" class="input-tall" placeholder="예) 조현준" />

      <label for="visitorName">방문자</label>
      <input id="visitorName" placeholder="예) 김정우,이정수" />

      <label for="meetingPurpose">회의 목적</label>
      <select id="meetingPurpose" class="select-tall">
        <option>단가 협의</option>
        <option>신규 개발</option>
        <option>품질 협의</option>
        <option selected>기타</option>
      </select>

      <label for="detailShort">목적 상세</label>
      <input id="detailShort" placeholder="예) 공정 라인 확인" />

      <br /><br />
      <button id="addBtn" type="button">추가</button>
    </div>

    <div class="card">
      <h2 style="font-size:14px;margin:0 0 6px;">최근 방문</h2>
      <table>
        <thead>
          <tr>
            <th>날짜</th><th>담당자</th><th>협력사</th>
            <th>방문자</th><th>목적</th><th>내용</th>
          </tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
    </div>

  </div>

  <script>
    (function () {
      const KEY = 'visits_data';
      const $ = (id) => document.getElementById(id);

      function storageAvailable() {
        try {
          const t = '__test__';
          localStorage.setItem(t, '1');
          localStorage.removeItem(t);
          return true;
        } catch (e) {
          return false;
        }
      }

      if (!storageAvailable()) {
        $('storageWarn').style.display = 'block';
      }

      function load() {
        try { return JSON.parse(localStorage.getItem(KEY)) || []; }
        catch (e) { return []; }
      }

      function save(arr) {
        localStorage.setItem(KEY, JSON.stringify(arr));
      }

      function esc(s) {
        return String(s ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function render() {
        const list = load().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        const body = $('list');
        body.innerHTML = '';

        list.slice(0, 10).forEach(v => {
          body.insertAdjacentHTML('beforeend', `
            <tr>
              <td>${esc(v.date)}</td>
              <td>${esc(v.manager)}</td>
              <td><span class="tag">${esc(v.vendor)}</span></td>
              <td>${esc(v.visitors)}</td>
              <td>${esc(v.purpose)}</td>
              <td>${esc(v.detail)}</td>
            </tr>
          `);
        });
      }

      $('addBtn').onclick = function () {
        const vendor = $('vendorName').value.trim();
        const date = $('visitDate').value;

        if (!vendor || !date) {
          alert('협력사명과 방문일은 필수입니다');
          return;
        }

        const arr = load();
        arr.push({
          vendor,
          date,
          manager: $('managerName').value.trim(),
          visitors: $('visitorName').value.trim(),
          purpose: $('meetingPurpose').value,
          detail: $('detailShort').value.trim()
        });

        save(arr);
        render();

        // 입력 편의: 필수만 유지하고 나머지 초기화(원하면 바꿔드림)
        $('detailShort').value = '';
      };

      // 최초 렌더
      render();
    })();
  </script>
</body>
</html>
