<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RPI 협력사 방문 관리</title>

<style>
body{
  font-family:system-ui,-apple-system,"Noto Sans KR","Malgun Gothic";
  background:#0b1220; color:#e9eefc; margin:0;
}
h1{margin:0;font-size:20px}
.wrap{max-width:1100px;margin:auto;padding:16px}
.card{
  background:#101a33;border-radius:14px;
  padding:14px;margin-bottom:16px;
}
label{font-size:12px;color:#9fb0d0}
input,select,textarea{
  width:100%;border-radius:12px;
  background:#00000030;color:#e9eefc;
  border:1px solid rgba(255,255,255,.12);
  padding:10px;font-size:14px;
}
.input-tall{height:96px;padding-top:14px;padding-bottom:14px}
.select-tall{height:96px}
button{
  background:#4da3ff;color:#081122;
  border:0;border-radius:12px;
  padding:10px 14px;font-weight:700;
  cursor:pointer;
}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border-bottom:1px solid rgba(255,255,255,.12);padding:8px;font-size:12px}
th{text-align:left;color:#cfe6ff}
.tag{background:#4da3ff33;padding:2px 8px;border-radius:999px}
</style>
</head>

<body>
<div class="wrap">

<h1>RPI 협력사 방문 관리</h1>
<p style="font-size:12px;color:#9fb0d0">
※ 데이터는 브라우저 LocalStorage(visits_data)에 저장됩니다
</p>

<div class="card">
<h2 style="font-size:14px">방문 기록 추가</h2>

<label>협력사명</label>
<input id="vendorName" class="input-tall" placeholder="예) 경동나비엔">

<label>방문일</label>
<input id="visitDate" type="date">

<label>담당자</label>
<input id="managerName" class="input-tall" placeholder="예) 조현준">

<label>방문자</label>
<input id="visitorName" placeholder="예) 김정우,이정수">

<label>회의 목적</label>
<select id="meetingPurpose" class="select-tall">
  <option>단가 협의</option>
  <option>신규 개발</option>
  <option>품질 협의</option>
  <option selected>기타</option>
</select>

<label>목적 상세</label>
<input id="detailShort" placeholder="예) 공정 라인 확인">

<br><br>
<button id="addBtn">추가</button>
</div>

<div class="card">
<h2 style="font-size:14px">최근 방문</h2>
<table>
<thead>
<tr>
<th>날짜</th><th>담당자</th><th>협력사</th>
<th>방문자</th><th>목적</th><th>내용</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

</div>

<script>
(function(){
  const KEY = 'visits_data';

  const $ = id => document.getElementById(id);

  function load(){
    try{ return JSON.parse(localStorage.getItem(KEY))||[]; }
    catch(e){ return []; }
  }
  function save(a){
    localStorage.setItem(KEY, JSON.stringify(a));
  }

  function render(){
    const list = load().sort((a,b)=>b.date.localeCompare(a.date));
    const body = $('list');
    body.innerHTML='';
    list.slice(0,10).forEach(v=>{
      body.insertAdjacentHTML('beforeend',`
        <tr>
          <td>${v.date}</td>
          <td>${v.manager}</td>
          <td><span class="tag">${v.vendor}</span></td>
          <td>${v.visitors}</td>
          <td>${v.purpose}</td>
          <td>${v.detail}</td>
        </tr>
      `);
    });
  }

  $('addBtn').onclick = function(){
    if(!$('vendorName').value || !$('visitDate').value){
      alert('협력사명과 방문일은 필수입니다'); return;
    }
    const a = load();
    a.push({
      vendor:$('vendorName').value,
      date:$('visitDate').value,
      manager:$('managerName').value,
      visitors:$('visitorName').value,
      purpose:$('meetingPurpose').value,
      detail:$('detailShort').value
    });
    save(a); render();
  };

  render();
})();
</script>

</body>
</html>
